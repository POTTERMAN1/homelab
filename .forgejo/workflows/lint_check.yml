name: CI / Linting
on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: docker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Replaces actions/setup-python completely
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip

      - name: Install Linters
        run: |
          pip3 install ansible ansible-lint yamllint --break-system-packages

      - name: Set up Ansible Vault Password
        run: printf "%s" "${{ secrets.ANSIBLE_VAULT_PASS }}" > ~/.ansible_vault_pass

      - name: Run YAML Lint
        run: yamllint .
        continue-on-error: true
      # --8<-- [start:lint-step]
      - name: Run Ansible Lint
        working-directory: ./ansible
        run: ansible-lint site.yml
# --8<-- [end:lint-step]
