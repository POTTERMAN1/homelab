name: CI / Linting & Security
on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: docker
    container:
      image: potter-ci-lint:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ansible Vault Password
        run: printf "%s" "${{ secrets.ANSIBLE_VAULT_PASS }}" > ~/.ansible_vault_pass

      # --- Syntax & Formatting ---
      - name: Run YAML Lint
        run: yamllint .

      - name: Run Markdownlint
        run: markdownlint '**/*.md' --ignore node_modules

      # --- IaC Linting ---
      - name: Ansible Syntax Check
        working-directory: ./ansible
        run: ansible-playbook site.yml --syntax-check

      - name: Run Ansible Lint
        working-directory: ./ansible
        run: ansible-lint site.yml

      - name: Run ShellCheck
        run: find . -name '*.sh' -exec shellcheck {} +

      - name: Run Hadolint (Dockerfiles)
        run: find . -name 'Dockerfile*' -not -name '*.j2' | xargs -r hadolint

      - name: Run TFLint
        run: |
          cd terraform
          tflint --init
          tflint

      - name: Run Kubeconform
        run: find kubernetes -name '*.yaml' | xargs -r kubeconform -strict

      # --- Security ---
      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose

      - name: Run Trivy (filesystem scan)
        run: trivy fs --severity HIGH,CRITICAL --exit-code 1 .
        continue-on-error: true
