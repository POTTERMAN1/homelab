# =============================================================================
# services.yml — Application Service Definitions
# =============================================================================
# Single source of truth for all Ansible-managed services.
# Drives: Caddyfile templating, Homepage dashboard, Renovate version pins.
#
# Rules:
#   - If a service has a Caddy entry, it belongs here.
#   - If a service has no Caddy entry (proxy_type: no_caddy), it may still live
#     here if other roles consume its data (e.g. teamspeak DNS, port config).
#   - Unmanaged infrastructure endpoints (PVE, PBS, OMV) live in infrastructure.yml.
#   - All image versions must be pinned — no 'latest' tags.

global_docker_base_path: "/opt"
global_nas_mount_path: "/mnt/NAS_ZFS"
global_timezone: "Europe/Warsaw"

app_services:
  # Identity & Access

  authentik:
    host: "debian-docker"
    subdomain: "auth"
    domain: "potterman.party"
    proxy_type: "standard"
    internal_port: 9000
    root_path: "{{ global_docker_base_path }}/authentik"
    image: "ghcr.io/goauthentik/server"
    # renovate: datasource=docker depName=ghcr.io/goauthentik/server versioning=loose
    version: "2025.12.4"
    # Sidecar versions pinned here for Renovate compatibility.
    postgresql_image: "docker.io/library/postgres"
    # renovate: datasource=docker depName=docker.io/library/postgres
    postgresql_version: "16-alpine"
    redis_image: "docker.io/library/redis"
    # renovate: datasource=docker depName=docker.io/library/redis
    redis_version: "7-alpine"

    # Core Infrastructure Services

  forgejo:
    host: "debian-docker"
    subdomain: "forgejo"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "codeberg.org/forgejo/forgejo"
    # renovate: datasource=docker depName=codeberg.org/forgejo/forgejo
    version: "14"
    internal_port: 3000
    ssh_port: 2222
    root_path: "{{ global_docker_base_path }}/forgejo"
    runner_image: "code.forgejo.org/forgejo/runner"
    # renovate: datasource=docker depName=code.forgejo.org/forgejo/runner
    runner_version: "9.0.3"

  pihole:
    host: "debian-docker"
    subdomain: "pihole"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "pihole/pihole"
    # renovate: datasource=docker depName=pihole/pihole versioning=loose
    version: "2025.11.1"
    internal_port: 800
    root_path: "{{ global_docker_base_path }}/pihole"

  homepage:
    host: "debian-docker"
    subdomain: "home"
    domain: "potterman.party"
    proxy_type: "standard"
    internal_port: 3005
    root_path: "{{ global_docker_base_path }}/homepage"
    image: "ghcr.io/gethomepage/homepage"
    # renovate: datasource=docker depName=ghcr.io/gethomepage/homepage
    version: "1.13.1"

  # Storage & Documents

  seafile:
    host: "ionos_vps"
    subdomain: "seafile"
    domain: "potterman.party"
    proxy_type: "standard"
    internal_port: 8060
    root_path: "{{ global_docker_base_path }}/seafile"
    # renovate: datasource=docker depName=python
    webhook_python_version: "3.12-slim"
    mariadb_image: "mariadb"
    # renovate: datasource=docker depName=mariadb
    mariadb_version: "10.11"
    memcached_image: "memcached"
    # renovate: datasource=docker depName=memcached
    memcached_version: "1.6"
    image: "seafileltd/seafile-mc"
    # renovate: datasource=docker depName=seafileltd/seafile-mc
    version: "13.0.22"

  paperless:
    host: "debian-docker"
    subdomain: "paperless"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "ghcr.io/paperless-ngx/paperless-ngx"
    # renovate: datasource=docker depName=ghcr.io/paperless-ngx/paperless-ngx
    version: "2.16.3"
    internal_port: 8000
    root_path: "{{ global_docker_base_path }}/paperless"
    consume_path: "{{ global_nas_mount_path }}/paperless/consume"
    backup_path: "{{ global_nas_mount_path }}/paperless/backup"
    redis_image: "redis"
    # renovate: datasource=docker depName=redis
    redis_version: "7-alpine"
    postgres_image: "postgres"
    # renovate: datasource=docker depName=postgres
    postgres_version: "16-alpine"
    gotenberg_image: "gotenberg/gotenberg"
    # renovate: datasource=docker depName=gotenberg/gotenberg
    gotenberg_version: "8"
    tika_image: "apache/tika"
    # renovate: datasource=docker depName=apache/tika
    tika_version: "3.2.0.0"

  garage:
    host: "k3s-node1"
    subdomain: "s3"
    domain: "potterman.party"
    proxy_type: "standard"
    internal_port: 30900
    # NodePort service on K3s — no root_path, not Docker-managed.

    # Finances

  firefly:
    host: "debian-docker"
    subdomain: "firefly"
    domain: "potterman.party"
    proxy_type: "forward_auth"
    internal_port: 8090
    root_path: "{{ global_docker_base_path }}/firefly"
    image: "fireflyiii/core"
    # renovate: datasource=docker depName=fireflyiii/core versioning=regex:^version-(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$
    version: "version-6.5.4"
    mariadb_image: "mariadb"
    # renovate: datasource=docker depName=mariadb
    mariadb_version: "11.8"
    cron_image: "alpine"
    # renovate: datasource=docker depName=alpine
    cron_version: "3.23.3"

  # Media

  jellyfin:
    host: "debian-docker"
    subdomain: "jellyfin"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "jellyfin/jellyfin"
    # renovate: datasource=docker depName=jellyfin/jellyfin versioning=semver
    version: "10.11.10"
    internal_port: 8096
    root_path: "{{ global_docker_base_path }}/jellyfin"

  jellyseerr:
    host: "debian-docker"
    subdomain: "jellyseer"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "fallenbagel/jellyseerr"
    # renovate: datasource=docker depName=fallenbagel/jellyseerr
    version: "2.7.3"
    internal_port: 5055
    root_path: "{{ global_docker_base_path }}/jellyseer"

  sonarr:
    host: "debian-docker"
    subdomain: "sonarr"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "linuxserver/sonarr"
    # renovate: datasource=docker depName=linuxserver/sonarr
    version: "4.0.16"
    internal_port: 8989
    root_path: "{{ global_docker_base_path }}/sonarr"

  radarr:
    host: "debian-docker"
    subdomain: "radarr"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "ghcr.io/hotio/radarr"
    # renovate: datasource=docker depName=linuxserver/radarr
    version: "6.0.4"
    internal_port: 7878
    root_path: "{{ global_docker_base_path }}/radarr"

  prowlarr:
    host: "debian-docker"
    subdomain: "prowlarr"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "linuxserver/prowlarr"
    # renovate: datasource=docker depName=linuxserver/prowlarr
    version: "2.3.0"
    internal_port: 9696
    root_path: "{{ global_docker_base_path }}/prowlarr"

  sabnzbd:
    host: "debian-docker"
    subdomain: "sabnzbd"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "linuxserver/sabnzbd"
    # renovate: datasource=docker depName=linuxserver/sabnzbd
    version: "4.5.5"
    internal_port: 8585
    container_port: 8080
    root_path: "{{ global_docker_base_path }}/sabnzbd"

  decypharr:
    host: "debian-docker"
    subdomain: "decypharr"
    domain: "potterman.party"
    proxy_type: "standard"
    image: "cy01/blackhole"
    # renovate: datasource=docker depName=cy01/blackhole
    version: "v1.1.6"
    internal_port: 8282
    root_path: "{{ global_docker_base_path }}/decypharr"

  # Gaming

  foundryvtt:
    host: "debian-docker"
    subdomain: "foundry"
    domain: "potterman.party"
    proxy_type: "standard"
    # renovate: datasource=github-releases depName=foundryvtt/foundryvtt-docker
    foundry_version: "13.351"
    internal_port: 30000
    root_path: "{{ global_docker_base_path }}/foundryvtt"
    foundry_user_data_path: "{{ global_nas_mount_path }}/foundryvtt/foundry_user_data"

  teamspeak:
    # No Caddy entry — DNS A-record and port config consumed by teamspeak role.
    # Public-facing on IONOS VPS, bypasses ZeroTier mesh intentionally.
    proxy_type: "no_caddy"
    root_path: "{{ global_docker_base_path }}/teamspeak"
    internal_port: 9987
    internal_port2: 30033

  pelican:
    image: "ghcr.io/pelican-dev/panel"
    # renovate: datasource=docker depName=ghcr.io/pelican-dev/panel
    version: "v1.0.0-beta33"
    subdomain: "pelican"
    domain: "potterman.party"
    internal_port: 80
    root_path: "{{ global_docker_base_path }}/pelican"

  # CI Toolchain — not a service, version pins for potter-ci-lint image builds

  ci_lint:
    image: "python"
    # renovate: datasource=docker depName=python
    version: "3.12-slim"
    # renovate: datasource=github-releases depName=gitleaks/gitleaks
    gitleaks_version: "8.24.0"
    # renovate: datasource=github-releases depName=terraform-linters/tflint
    tflint_version: "0.55.1"
    # renovate: datasource=github-releases depName=hadolint/hadolint
    hadolint_version: "2.12.0"
    # renovate: datasource=github-releases depName=yannh/kubeconform
    kubeconform_version: "0.6.7"
    # renovate: datasource=github-releases depName=igorshubovych/markdownlint-cli
    markdownlint_version: "0.44.0"
