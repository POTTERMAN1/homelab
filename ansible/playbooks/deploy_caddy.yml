- name: Deploy Caddy with Cloudflare DNS on PVE host
  hosts: pve
  become: true
  tasks:
    - name: Stop Caddy (if running)
      ansible.builtin.systemd:
        name: caddy
        state: stopped
      register: caddy_stop_result
      failed_when:
        - caddy_stop_result.failed
        - "`Could not find the requested service` not in caddy_stop_result.msg"

    - name: Download Caddy binary with Cloudflare plugin
      ansible.builtin.get_url:
        url: "https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com%2Fcaddy-dns%2Fcloudflare"
        dest: /usr/bin/caddy
        mode: "0755" # Owner can execute
      notify:
        - Restart Caddy

    - name: Ensure /etc/caddy directory exists
      ansible.builtin.file:
        path: /etc/caddy
        state: directory
        mode: "0755"

    - name: Deploy Caddyfile Template
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        mode: "0644" # Owner can read/write but not execute
        validate: caddy validate --adapter caddyfile --config %s
      notify:
        - Reload Caddy

    - name: Deploy Cloudflare API Token .env file
      ansible.builtin.copy:
        content: "CLOUDFLARE_API_TOKEN={{ vault_cloudflare_api_token }}"
        dest: /etc/caddy/.cloudflare.env
        mode: "0600"
      notify:
        - Restart Caddy

    - name: Create Systemd override directory for Caddy
      ansible.builtin.file:
        path: /etc/systemd/system/caddy.service.d/
        state: directory
        mode: '0755'

    - name: Inject EnvironmentFile directive into Caddy Systemd
      ansible.builtin.copy:
        content: |
          [Service]
          EnvironmentFile=/etc/caddy/.cloudflare.env
        dest: /etc/systemd/system/caddy.service.d/override.conf
        mode: '0644'
      notify:
        - Reload Systemd
        - Restart Caddy

  handlers:
    - name: Reload Systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart Caddy
      ansible.builtin.systemd:
        name: caddy
        state: restarted
        enabled: true

    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded

