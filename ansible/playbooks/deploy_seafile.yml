---
- name: Deploy Hybrid-Cloud Seafile
  hosts: ionos_vps
  become: true
  vars:
    seafile_root: "{{ docker_base_path }}/seafile"
    nas_mount: "/mnt/NAS_ZFS/seafile-data"

  tasks:

    - name: Ensure Docker Environment is Ready
      ansible.builtin.include_tasks: tasks/install_docker.yml

    - name: Ensure Local Directories Exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "root"
        group: "root"
        mode: '0755'
      loop:
        - "{{ seafile_root }}"
        - "{{ seafile_root }}/seafile-data"
        - "{{ seafile_root }}/mariadb"

    - name: Render Docker Compose
      ansible.builtin.template:
        src: templates/seafile_compose_yaml.j2
        dest: "{{ seafile_root }}/docker-compose.yml"
        mode: "0644"

    - name: Spin up Seafile Stack
      community.docker.docker_compose_v2:
        project_src: "{{ seafile_root }}"
        state: present
        wait: true

    - name: Find the actual seahub config directory
      ansible.builtin.shell: "find {{ seafile_root }}/seafile-data -type d -name 'conf' | grep 'seafile/conf'"
      register: found_conf_dir
      until: found_conf_dir.stdout != ""
      retries: 20
      delay: 5

    - name: Wait for seahub_settings.py to be generated by Seafile
      ansible.builtin.wait_for:
        path: "{{ found_conf_dir.stdout }}/seahub_settings.py"
        state: present
        timeout: 120

    - name: Inject SSO Configuration into Seahub Settings
      ansible.builtin.blockinfile:
        path: "{{ found_conf_dir.stdout }}/seahub_settings.py"
        block: |
          ENABLE_OAUTH = True
          OAUTH_ENABLE_INSECURE_TRANSPORT = True
          OAUTH_VERIFY_EMAIL = False
          OAUTH_CLIENT_ID = '{{ vault_seafile_client_id }}'
          OAUTH_CLIENT_SECRET = '{{ vault_seafile_client_secret }}'
          OAUTH_REDIRECT_URL = 'https://seafile.potterman.party/oauth/callback/'
          OAUTH_PROVIDER = 'authentik'
          OAUTH_PROVIDER_DOMAIN = 'auth.potterman.party'
          OAUTH_AUTHORIZATION_URL = 'https://auth.potterman.party/application/o/authorize/'
          OAUTH_TOKEN_URL = 'https://auth.potterman.party/application/o/token/'
          OAUTH_USER_INFO_URL = 'https://auth.potterman.party/application/o/userinfo/'
          OAUTH_SCOPE = ['openid', 'profile', 'email']

          OAUTH_ATTRIBUTE_MAP = {
              "email": (True, "contact_email"),
              "name": (False, "name"),
              "sub": (False, "uid"),
          }
          LOGIN_URL = 'https://seafile.potterman.party/oauth/login/'

          OAUTH_CREATE_UNKNOWN_USER = True
          OAUTH_ACTIVATE_USER_AFTER_CREATION = True
          CSRF_TRUSTED_ORIGINS = ['https://seafile.potterman.party']
          CLIENT_SSO_VIA_LOCAL_BROWSER = True
        marker: "# {mark} ANSIBLE MANAGED BLOCK - SSO CONFIG"

    - name: Restart Seafile to apply SSO settings
      community.docker.docker_compose_v2:
        project_src: "{{ seafile_root }}"
        state: restarted
        services:
          - seafile

- import_playbook: deploy_caddy.yml