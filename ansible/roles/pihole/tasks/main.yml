- name: Ensure Pi-hole Directory Exists
  ansible.builtin.file:
    path: "{{ app_services.pihole.root_path }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'
  tags: pihole

- name: Render Docker Compose
  ansible.builtin.template:
    src: templates/pihole_docker-compose.yml.j2
    dest: "{{ app_services.pihole.root_path }}/docker-compose.yml"
    mode: "0644"
  tags: pihole

- name: Spin up Pi-hole
  community.docker.docker_compose_v2:
    project_src: "{{ app_services.pihole.root_path }}"
    state: present
    wait: true
  tags: pihole
