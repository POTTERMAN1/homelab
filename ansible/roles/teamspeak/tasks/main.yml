- name: Create 'DNS Only' A-Record for TeamSpeak
  ansible.builtin.uri:
    url: "https://desec.io/api/v1/domains/potterman.party/rrsets/"
    method: POST
    headers:
      Authorization: "Token {{ vault_desec_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      - subname: "teamspeak"
        type: "A"
        ttl: 3600
        records:
          - "{{ ansible_host }}"
    status_code: [201, 200]
  delegate_to: localhost
  become: false
  tags: teamspeak

- name: Ensure TeamSpeak config directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - "{{ app_services.teamspeak.root_path }}"
  tags: teamspeak

- name: Render Docker Compose
  ansible.builtin.template:
    src: templates/teamspeak_compose.yaml.j2
    dest: "{{ app_services.teamspeak.root_path }}/docker-compose.yml"
    mode: "0600"
  tags: teamspeak

- name: Start Teamspeak Server Container
  community.docker.docker_compose_v2:
    project_src: "{{ app_services.teamspeak.root_path }}"
    state: present
    pull: always
  tags: teamspeak

- name: Get TeamSpeak Admin Token from logs
  ansible.builtin.shell: |
    set -o pipefail
    sudo grep -r "token=" /opt/teamspeak/logs/ | head -n 1 | cut -d "=" -f2
  args:
    executable: /bin/bash
  register: teamspeak_token
  changed_when: false
  failed_when: false
  tags: teamspeak

- name: Print your Admin Key
  ansible.builtin.debug:
    msg: "Your TeamSpeak Privilege Key is: {{ teamspeak_token.stdout }} "
  when: teamspeak_token.stdout != ""
  tags: teamspeak
