- name: Install system dependencies for Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker's official GPG key
  ansible.builtin.get_url:
    # Dynamically injects 'ubuntu' or 'debian' based on the actual OS
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker repository to Apt sources
  ansible.builtin.apt_repository:
    # Safely translates 'x86_64' to 'amd64' for APT compatibility
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture
      == 'aarch64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release
      }} stable
    state: present
    filename: docker
    update_cache: true

- name: Install Docker Engine and Ansible SDK
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true

- name: Ensure 'potterman' is in the docker group
  ansible.builtin.user:
    name: potterman
    groups: docker
    append: true
  register: docker_user_group_check

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
